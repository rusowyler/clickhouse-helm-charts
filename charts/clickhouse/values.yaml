---
# @ignore
nameOverride: ""
# @ignore
fullnameOverride: ""

# -- Custom domain pattern used for DNS names of `Service` and `Pod` resources.
# Typically defined by the custom cluster domain of the Kubernetes cluster.
# The pattern follows the `%s` C-style printf format, e.g. '%s.svc.my.test'.
# If not specified, the default namespace domain suffix is `.svc.cluster.local`.
namespaceDomainPattern: ""

# Configure ClickHouse Installation and Pod Template
clickhouse:
  defaultUser:
    password: ""
    # -- Name of an existing Kubernetes secret containing the default user password.
    # If set, the password will be read from the secret instead of using the password field.
    # The secret should contain a key named 'password'.
    password_secret_name: ""
    # -- Allow the default user to access ClickHouse from any IP.
    # If set, will override `hostIP` to always be `0.0.0.0/0`.
    allowExternalAccess: false
    # defaultUser.hostIP -- (string) Set a mask for IPs allowed for the
    # default user. Should not be set if allowExternalAccess is set.
    # @default -- 127.0.0.1/32
    hostIP: 127.0.0.1/32

  # -- Configure additional ClickHouse users and per-user settings.
  users: []
  # users:
  #   - name: app_user
  #     hostIP: ["10.0.0.0/8"]  # default: "0.0.0.0/0"
  #     accessManagement: 1  # default: 0
  #     password_secret_name: "app-user-secret"  # secret must contain 'password' key
  #     profile: "app_profile"
  #     grants:
  #       - "GRANT SELECT ON database.*"
  #     settings:
  #       max_memory_usage: "40000000000"
  #       max_query_size: "2000000"
  #       readonly: "0"
  #       allow_ddl: "0"
  #       connect_timeout_with_failover_ms: "10000"
  # Named profiles, referenced by users[].profile
  profiles: {}
  # profiles:
  #   app_profile:
  #     max_memory_usage: "40000000000"
  #     max_query_size: "2000000"
  #     readonly: "0"
  #     allow_ddl: "0"
  #     connect_timeout_with_failover_ms: "10000"
  # Server level settings for each clickhouse replica
  settings: {}
#  settings:
#    max_table_size_to_drop: "0"
#    max_concurrent_queries: 1000
#    logger/level: "error"
#    logger/console: "true"
#    restore_threads: 48
#    prometheus/endpoint: /metrics
#    prometheus/port: 9363
#    prometheus/metrics: true
#    prometheus/events: true
#    prometheus/asynchronous_metrics: true
#    prometheus/status_info: true

  # -- number of replicas. If greater than 1, keeper must be enabled
  # or a keeper host should be provided under clickhouse.keeper.host.
  # Will be ignored if `zones` is set.
  replicasCount: 1

  # -- number of shards.
  shardsCount: 1

  # -- Cluster secret configuration for secure inter-node communication
  clusterSecret:
    # -- Whether to enable secret-based cluster communication
    enabled: false
    # -- Whether to secure this behind the SSL port
    secure: false
    # -- Auto-generate cluster secret (recommended for security)
    auto: true
    # -- Plaintext cluster secret value (not recommended for production)
    value: ""
    # -- Reference to an existing Kubernetes secret containing the cluster secret
    valueFrom:
      secretKeyRef:
        # -- Name of the secret containing the cluster secret
        name: ""
        # -- Key in the secret that contains the cluster secret value
        key: "secret"

  # Specify which zones to run in.
  # `replicaCount` will be applied within each zone.
  zones: []

  # If enabled, will prevent ClickHouse pods from running on the same node
  antiAffinity: false

  # -- Scope for anti-affinity policy when antiAffinity is enabled.
  # Determines the level at which pod distribution is enforced.
  # Available scopes:
  #   - ClickHouseInstallation: Pods from the same installation won't run on the same node (default)
  #   - Shard: Pods from the same shard won't run on the same node
  #   - Replica: Pods from the same replica won't run on the same node
  #   - Cluster: Pods from the same cluster won't run on the same node
  #   - Namespace: Pods from the same namespace won't run on the same node
  # @default -- ClickHouseInstallation
  antiAffinityScope: "ClickHouseInstallation"

  # -- Keeper connection settings for ClickHouse instances.
  keeper:
    # -- Specify a keeper host.
    # Should be left empty if `clickhouse-keeper.enabled` is `true`.
    # Will override the defaults set from `clickhouse-keeper.enabled`.
    host: ""
    # -- Override the default keeper port
    port: 2181

  persistence:
    # -- enable storage
    enabled: true
    # -- volume size (per replica)
    size: 10Gi
    accessMode: ReadWriteOnce
    ## -- StorageClass for PV (e.g. gp2, standard, ...)
    storageClass: ""
    logs:
      # -- enable pvc for logs
      enabled: false
      # -- size for logs pvc
      size: 10Gi
      accessMode: ReadWriteOnce

  image:
    repository: altinity/clickhouse-server
    pullPolicy: IfNotPresent
    # -- Override the image tag for a specific version
    tag: "25.3.6.10034.altinitystable"

  service:
    # e.g. `LoadBalancer`, `NodePort`
    type: ClusterIP
    serviceAnnotations: {}
    serviceLabels: {}
    ports:
      - name: http
        port: 8123
        targetPort: 8123
      - name: tcp
        port: 9000
        targetPort: 9000

  lbService:
    enabled: false
    # -- Specify source IP ranges to the LoadBalancer service.
    # If supported by the platform, this will restrict traffic through the cloud-provider load-balancer
    # to the specified client IPs. This is ignored if the cloud-provider does not support the feature.
    loadBalancerSourceRanges: []
    serviceAnnotations: {}
    serviceLabels: {}
    ports:
      - name: http
        port: 8123
        targetPort: 8123
      - name: tcp
        port: 9000
        targetPort: 9000

  # @ignore
  imagePullSecrets: []

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: false
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  podAnnotations: {}
  podLabels: {}

  # @ignore
  podSecurityContext: {}
    # runAsUser: 101
    # runAsGroup: 101

  # @ignore
  securityContext: {}

  # @ignore
  nodeSelector: {}

  # @ignore
  tolerations: []

  # @ignore
  affinity: {}

  # @ignore
  topologySpreadConstraints: []


  # -- Miscellanous config for ClickHouse (in xml format)
  extraConfig: |
    <clickhouse>
    </clickhouse>
  # -- Additional users config for ClickHouse (in xml format)
  extraUsers: |
    <clickhouse>
    </clickhouse>

  # -- Additional entries for spec.configuration.files.
  # String values are rendered inline; map values (e.g. valueFrom) are passed as structured YAML.
  # Example:
  #   configurationFiles:
  #     config.d/tls.xml: |
  #       <clickhouse>
  #         <https_port>8443</https_port>
  #       </clickhouse>
  #     tls.crt:
  #       valueFrom:
  #         secretKeyRef:
  #           name: my-tls-secret
  #           key: tls.crt
  configurationFiles: {}

  # -- Extra containers for clickhouse pods
  extraContainers: []

  # -- Extra volumes for clickhouse pods
  extraVolumes: []

  # -- clickhouse-backup sidecar configuration.
  # See https://github.com/Altinity/clickhouse-backup/blob/master/Examples.md#how-to-use-clickhouse-backup-in-kubernetes
  backup:
    # -- Whether to deploy clickhouse-backup as a sidecar container.
    # Requires clickhouse.persistence.enabled to be true.
    enabled: false

    image:
      repository: altinity/clickhouse-backup
      tag: "latest"
      pullPolicy: IfNotPresent

    # -- Name of the dedicated ClickHouse backup user.
    userName: "clickhouse_backup"

    # -- Plaintext password for the backup user (not recommended for production).
    password: ""

    # -- SHA256 hex of the backup user password.
    # Ignored if password_secret_name is set.
    password_sha256_hex: ""

    # -- Name of an existing Kubernetes secret containing the backup user password.
    # The secret must contain a key named 'password'.
    # Takes precedence over password and password_sha256_hex.
    password_secret_name: ""

    # -- Host IP mask allowing the backup user to connect.
    # Defaults to 127.0.0.1/32 since the sidecar communicates over localhost.
    hostIP: "127.0.0.1/32"

    # -- Port for the backup REST API server.
    port: 7171

    # -- Whether to expose the backup API port in ClickHouse service templates.
    exposePort: false

    # -- Resource requests/limits for the backup sidecar container.
    resources: {}

    # -- Environment variables for the backup sidecar.
    # Use these to configure remote storage backends and clickhouse-backup options.
    # Supports the same format as Kubernetes container env (name/value or name/valueFrom).
    env:
      - name: LOG_LEVEL
        value: "info"
      - name: ALLOW_EMPTY_BACKUPS
        value: "true"
      - name: API_LISTEN
        value: "0.0.0.0:7171"
      - name: API_CREATE_INTEGRATION_TABLES
        value: "true"
      - name: BACKUPS_TO_KEEP_REMOTE
        value: "3"
    # env:
    #   - name: REMOTE_STORAGE
    #     value: "s3"
    #   - name: S3_BUCKET
    #     value: "my-clickhouse-backups"
    #   - name: S3_REGION
    #     value: "us-east-1"
    #   - name: S3_PATH
    #     value: "backup/shard-{shard}"
    #   - name: S3_ACCESS_KEY
    #     valueFrom:
    #       secretKeyRef:
    #         name: backup-s3-credentials
    #         key: access-key
    #   - name: S3_SECRET_KEY
    #     valueFrom:
    #       secretKeyRef:
    #         name: backup-s3-credentials
    #         key: secret-key

    # -- Additional volume mounts for the backup sidecar.
    extraVolumeMounts: []

    # -- CronJob for scheduled backups (full + incremental).
    cronjob:
      # -- Whether to create the backup CronJob(s).
      enabled: false

      # -- Cron schedule for full backups (default: Sundays at midnight).
      fullSchedule: "0 0 * * 0"

      # -- Cron schedule for incremental backups (default: Mon-Sat at 01:00).
      incrementalSchedule: "0 1 * * 1-6"

      # -- Whether to also create the incremental backup CronJob.
      incrementalEnabled: true

      # -- Concurrency policy for both CronJobs.
      concurrencyPolicy: Forbid

      # -- Successful job history limit.
      successfulJobsHistoryLimit: 3

      # -- Failed job history limit.
      failedJobsHistoryLimit: 3

      # -- Prefix for full backup names.
      fullBackupName: "full"

      # -- Prefix for incremental backup names.
      incrementalBackupName: "incremental"

      # -- Resource requests/limits for CronJob pods.
      resources: {}

      # -- Node selector for CronJob pods.
      nodeSelector: {}

      # -- Tolerations for CronJob pods.
      tolerations: []

  # -- Init scripts ConfigMap configuration
  initScripts:
    # -- Set to true to enable init scripts feature
    enabled: false
    # -- Name of an existing ConfigMap containing init scripts
    # The scripts will be mounted at /docker-entrypoint-initdb.d/
    configMapName: ""
    # -- Set to true to always run init scripts on container startup
    alwaysRun: true
  resources: {}
#  Example on how you specify resources of the clickhouse container
#
#  resources:
#    requests:
#      memory: "150Gi"
#    limits:
#      memory: "200Gi"

# CHK parameters
keeper:
  # -- Whether to enable Keeper.
  # Required for replicated tables.
  enabled: false
  # -- Number of keeper replicas.
  # Must be an odd number.
  # !! DO NOT CHANGE AFTER INITIAL DEPLOYMENT
  replicaCount: 3
  image: "altinity/clickhouse-keeper"
  tag: "25.3.6.10034.altinitystable"
  # allows to configure multiple aspects and behavior for `clickhouse-keeper`
  # instance
  settings: {}
  localStorage:
    size: 5Gi
    storageClass: ""
  nodeSelector: {}
  tolerations: []
  podAnnotations: {}
  volumeClaimAnnotations: {}
  # topologySpreadConstraints over `zone`, by deafult there is only
  # podAntiAffinity by hostname
  zoneSpread: false
  metricsPort: ""
  resources:
    cpuRequestsMs: 100
    memoryRequestsMiB: 512Mi
    cpuLimitsMs: 500
    memoryLimitsMiB: 1Gi
  
  # @ignore
  podSecurityContext: {}
    # runAsUser: 101
    # runAsGroup: 101

  # @ignore
  securityContext: {}

operator:
  # -- Whether to enable the Altinity Operator for ClickHouse.
  # Disable if you already have the Operator installed cluster-wide.
  enabled: true
  
